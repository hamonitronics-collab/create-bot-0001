bot:
  chain: "arbitrum"
  monitoring_interval: 2.0
  dry_run: True

trading:
  price_difference_threshold: 0.3
  min_profit_usd: 0.1
  max_slippage: 1.0
  trade_amount_usd: 100.0
  priority_fee:2.0

risk_management:
  max_drawdown_percent: 20.0
  max_daily_loss_usd: 100
  stop_on_consecutive_failures: 3

telegram:
  enabled: false
  chat_id: "YOUR_CHAT_ID"
  token: "YOUR_BOT_TOKEN"

logging:
  level: "INFO"
  file: "logs/bot_triangular.log"
